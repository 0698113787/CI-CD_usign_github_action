<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Stores</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>BMW Cars</h1>
    <div id="car-list">
        {% for car in cars %}
        <div class="car">
            <h2>{{ car.name }}</h2>
            <p>{{ car.price }}</p>
        </div>
        {% endfor %}
    </div>

    <button onclick="showCars()">Show Cars</button>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
