name: BMW Store CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest      # changed from windows-latest (ubuntu is faster and free)

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'   # ✅ now correctly indented under "with"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check app syntax
        run: python -m py_compile app.py

      - name: Done
        run: echo "Build passed!"